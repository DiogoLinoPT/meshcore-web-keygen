<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeshCore Portugal - Regiões - proposta do Diogo Lino</title>

    <!-- Leaflet JS & CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Turf JS for Spatial calculations -->
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>

    <!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-main: #f8f9fa;
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --text-secondary: #7f8c8d;
            --accent-primary: #f05e16;
            --accent-secondary: #3498db;
            --accent-hover: #d24e10;
            --border-color: #e0e0e0;
            --header-bg: #e2e8f0;
            --header-text: #1a202c;
            --sidebar-bg: #ffffff;
            --node-hover: #f1f5f9;
        }

        [data-theme="dark"] {
            --bg-main: #111113;
            --bg-card: #1a1a1c;
            --text-main: #f8f9fa;
            --text-secondary: #a0aec0;
            --accent-primary: #f05e16;
            --accent-secondary: #3498db;
            --accent-hover: #ff7635;
            --border-color: #2d3748;
            --header-bg: #1a1a1c;
            --header-text: #f8f9fa;
            --sidebar-bg: #1a1a1c;
            --node-hover: #2d3748;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--header-bg);
            color: var(--header-text);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-primary);
        }

        .header h1 {
            font-size: 1.5em;
            font-weight: 700;
        }

        .header nav a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
            margin-right: 15px;
        }
        
        .header nav a:hover {
            text-decoration: underline;
        }

        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 62px);
        }

        #map-container {
            flex: 2;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        #sidebar {
            flex: 1;
            background: var(--sidebar-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0,0,0,0.02);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .region-group {
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        .region-header {
            background: var(--bg-main);
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .region-header:hover {
            background: var(--node-hover);
        }

        .region-nodes {
            display: none;
            border-top: 1px solid var(--border-color);
        }

        .region-nodes.open {
            display: block;
        }

        .node-item {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9em;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .node-item:last-child {
            border-bottom: none;
        }

        .node-item:hover {
            background: var(--node-hover);
            color: var(--accent-primary);
        }

        .node-id {
            font-family: monospace;
            color: var(--text-secondary);
        }

        .loader-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 1000;
            font-weight: bold;
            font-size: 1.2em;
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>MeshCore Regiões (Portugal) - proposta do Diogo Lino</h1>
    </div>

    <div class="main-container">
        <div id="map-container">
            <div id="loader" class="loader-overlay">A carregar Nós e Fronteiras...</div>
            <div id="map"></div>
        </div>
        <div id="sidebar">
            <div class="sidebar-header">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>Nós por Região</h3>
                    <div style="display: flex; gap: 10px;">
                        <select id="typeSelect" style="padding: 4px; border-radius: 4px; background: var(--header-bg); color: var(--text-main); border: 1px solid var(--border-color);" onchange="changeBufferDistance()">
                            <option value="regions" selected>Distritos</option>
                            <option value="cims">Ent. Intermunicipais</option>
                            <option value="both">Todos</option>
                        </select>
                        <select id="bufferSelect" style="padding: 4px; border-radius: 4px; background: var(--header-bg); color: var(--text-main); border: 1px solid var(--border-color);" onchange="changeBufferDistance()">
                            <option value="20" selected>Expansão: +20km</option>
                            <option value="35">Expansão: +35km</option>
                            <option value="50">Expansão: +50km</option>
                        </select>
                    </div>
                </div>
                <p id="sidebar-desc" style="font-size: 0.85em; color: var(--text-secondary); margin-top: 5px;">
                    Baseado em distritos expandidos (+20km). Os nós podem pertencer a múltiplas regiões sobrepostas.
                </p>
            </div>
            <div class="sidebar-content" id="region-list">
                <!-- Javascript will populate this -->
            </div>
        </div>
    </div>

    <script>
        let map;
        let regionsGeoJSON;
        let activeNodes = [];
        let regionMapping = {}; // { "Lisboa": [node1, node2] }
        let markers = {};
        let geoJsonLayer = null;
        let markerLayerGroup = null;

        // Cores para os polígonos
        const regionColors = ['#f05e16', '#3498db', '#9b59b6', '#2ecc71', '#f1c40f', '#e74c3c', '#1abc9c'];

        function formatFirmwareRegion(name, isCim) {
            let clean = name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/ /g, '-');
            if (isCim) {
                if (clean === 'area-metropolitana-de-lisboa' || clean === 'area-metropolitana-do-porto') {
                    return '#' + clean.replace('area-metropolitana-de-', 'am-').replace('area-metropolitana-do-', 'am-');
                } else if (clean === 'regiao-autonoma-dos-acores') {
                    return '#ra-acores';
                } else if (clean === 'regiao-autonoma-da-madeira') {
                    return '#ra-madeira';
                } else {
                    return '#cim-' + clean;
                }
            } else {
                if (clean === 'regiao-autonoma-dos-acores') {
                    return '#ra-acores';
                } else if (clean === 'regiao-autonoma-da-madeira') {
                    return '#ra-madeira';
                }
                return '#' + clean;
            }
        }

        function initMap() {
            map = L.map('map').setView([39.5, -8.0], 6);
            
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const tileUrl = isDark 
                ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' 
                : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';

            L.tileLayer(tileUrl, {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            markerLayerGroup = L.layerGroup().addTo(map);

            // Add map click listener to show all overlapping regions
            map.on('click', function(e) {
                const pt = turf.point([e.latlng.lng, e.latlng.lat]);
                const clickedRegions = [];
                if (regionsGeoJSON && regionsGeoJSON.features) {
                    regionsGeoJSON.features.forEach(feature => {
                        if (turf.booleanPointInPolygon(pt, feature)) {
                            clickedRegions.push(formatFirmwareRegion(feature.properties.name, feature.properties.is_cim));
                        }
                    });
                }
                if (clickedRegions.length > 0) {
                    L.popup()
                        .setLatLng(e.latlng)
                        .setContent(`<b>Regiões neste ponto (${clickedRegions.length}):</b><br><ul style="margin-top: 5px; padding-left: 20px;"><li>${clickedRegions.join('</li><li>')}</li></ul>`)
                        .openOn(map);
                }
            });
        }

        function toggleRegion(el) {
            const content = el.nextElementSibling;
            if(content.classList.contains('open')) {
                content.classList.remove('open');
                el.querySelector('.toggle-icon').innerText = '+';
            } else {
                content.classList.add('open');
                el.querySelector('.toggle-icon').innerText = '-';
            }
        }

        function focusNode(lat, lon) {
            map.flyTo([lat, lon], 12);
        }

        async function fetchRegions(distance = 20) {
            try {
                const regionType = document.getElementById('typeSelect') ? document.getElementById('typeSelect').value : 'regions';
                let features = [];

                if (regionType === 'both' || regionType === 'regions') {
                    const res = await fetch('data/pt_regions_' + distance + 'km.geojson');
                    const json = await res.json();
                    features = features.concat(json.features);
                }
                if (regionType === 'both' || regionType === 'cims') {
                    const res = await fetch('data/pt_cims_' + distance + 'km.geojson');
                    const json = await res.json();
                    features = features.concat(json.features);
                }

                regionsGeoJSON = { type: "FeatureCollection", features: features };
                
                // Add polygons to map
                let colorIndex = 0;
                geoJsonLayer = L.geoJSON(regionsGeoJSON, {
                    style: function (feature) {
                        const color = regionColors[colorIndex % regionColors.length];
                        colorIndex++;
                        return {
                            color: color,
                            weight: 2,
                            opacity: 0.8,
                            fillColor: color,
                            fillOpacity: 0.1
                        };
                    },
                    onEachFeature: function (feature, layer) {
                        let isCim = feature.properties.is_cim === true;
                        let mappingKey = feature.properties.name + (isCim ? '|cim' : '|dist');
                        regionMapping[mappingKey] = []; // Initialize empty array for this region
                    }
                }).addTo(map);

            } catch (err) {
                console.error("Failed to load region boundaries", err);
            }
        }

        async function fetchNodes() {
            // Reusing logic from MeshCore-Portugal_KeyGen.html (Last 7 days)
            const date = new Date();
            date.setDate(date.getDate() - 7);
            const updatedSinceStr = date.toISOString();

            try {
                const rawUrlLIS = `https://api.letsmesh.net/api/nodes?region=LIS&updated_since=${encodeURIComponent(updatedSinceStr)}`;
                const rawUrlOPO = `https://api.letsmesh.net/api/nodes?region=OPO&updated_since=${encodeURIComponent(updatedSinceStr)}`;

                const [resLIS, resOPO] = await Promise.all([
                    fetch(`https://corsproxy.io/?${encodeURIComponent(rawUrlLIS)}`),
                    fetch(`https://corsproxy.io/?${encodeURIComponent(rawUrlOPO)}`)
                ]);

                const dataLIS = await resLIS.json();
                const dataOPO = await resOPO.json();

                let combinedNodes = [];
                if (dataLIS && dataLIS.nodes) combinedNodes = combinedNodes.concat(dataLIS.nodes);
                if (dataOPO && dataOPO.nodes) combinedNodes = combinedNodes.concat(dataOPO.nodes);

                const uniqueMap = new Map();
                for (let n of combinedNodes) {
                    if (n && n.public_key) {
                        // Keep repeaters (2) and room servers (3)
                        if (n.device_role !== 2 && n.device_role !== 3) continue;
                        
                        let lat = null, lon = null;
                        if (n.position && n.position.latitude) {
                            lat = n.position.latitude; lon = n.position.longitude;
                        } else if (n.location && n.location.latitude) {
                            lat = n.location.latitude; lon = n.location.longitude;
                        } else if (n.lat) {
                            lat = n.lat; lon = n.long || n.lon;
                        }

                        if (lat && lon) {
                            n.latitude = lat;
                            n.longitude = lon;
                            uniqueMap.set(n.public_key, n);
                        }
                    }
                }
                activeNodes = Array.from(uniqueMap.values());
            } catch(err) {
                console.warn("Letsmesh API error, trying fallback...", err);
                try {
                    const fallbackUrl = `https://www.meshcore.pt/api/nodes/list?days=7&excludeUsers=true&v=1`;
                    const resFallback = await fetch(fallbackUrl);
                    const fallbackNodes = await resFallback.json();
                    
                    const uniqueMap = new Map();
                    for (let n of fallbackNodes) {
                        if (n && n.Id) {
                            if (n.Role !== 2 && n.Role !== 3) continue;
                            
                            let lat = n.Lat || n.lat;
                            let lon = n.Lon || n.long || n.lon;

                            if (lat && lon) {
                                uniqueMap.set(n.Id, {
                                    public_key: n.Id,
                                    long_name: n.LongName || n.name,
                                    short_name: n.ShortName || n.name,
                                    latitude: lat,
                                    longitude: lon,
                                    device_role: n.Role
                                });
                            }
                        }
                    }
                    activeNodes = Array.from(uniqueMap.values());
                } catch(e) {
                    console.error("Fallback also failed.", e);
                }
            }
        }

        async function changeBufferDistance() {
            const distance = document.getElementById('bufferSelect').value;
            const regionType = document.getElementById('typeSelect').value;
            const typeLabel = regionType === 'regions' ? 'distritos' : (regionType === 'cims' ? 'entidades intermunicipais' : 'distritos e entidades intermunicipais');
            document.getElementById('sidebar-desc').innerText = `Baseado em ${typeLabel} expandidas (+${distance}km). Os nós podem pertencer a múltiplas regiões sobrepostas.`;
            document.getElementById('loader').style.display = 'flex';
            
            // Clear existing data
            if (geoJsonLayer) map.removeLayer(geoJsonLayer);
            if (markerLayerGroup) markerLayerGroup.clearLayers();
            regionMapping = {};
            markers = {};
            
            await fetchRegions(distance);
            calculateIntersectionsAndRender();
            document.getElementById('loader').style.display = 'none';
        }

        function calculateIntersectionsAndRender() {
            let distGlobalExclusive = 0;
            let distGlobalShared = 0;
            let distGlobalUnassigned = 0;
            let cimGlobalExclusive = 0;
            let cimGlobalShared = 0;
            let cimGlobalUnassigned = 0;
            
            const distLabels = [];
            const distData = [];
            const cimLabels = [];
            const cimData = [];

            // Draw markers on map
            activeNodes.forEach(node => {
                const pt = turf.point([node.longitude, node.latitude]);
                const nodeRegions = [];
                node.distCount = 0;
                node.cimCount = 0;

                if (regionsGeoJSON && regionsGeoJSON.features) {
                    regionsGeoJSON.features.forEach(feature => {
                        // Fix for booleanPointInPolygon: needs standard Polygon/MultiPolygon
                        if (turf.booleanPointInPolygon(pt, feature)) {
                            let isCim = feature.properties.is_cim === true;
                            nodeRegions.push(formatFirmwareRegion(feature.properties.name, isCim));
                            
                            let mappingKey = feature.properties.name + (isCim ? '|cim' : '|dist');
                            if (regionMapping[mappingKey]) {
                                regionMapping[mappingKey].push(node);
                            }
                            
                            if (isCim) node.cimCount++;
                            else node.distCount++;
                        }
                    });
                }
                
                if (node.distCount === 1) distGlobalExclusive++;
                else if (node.distCount > 1) distGlobalShared++;
                else distGlobalUnassigned++;
                
                if (node.cimCount === 1) cimGlobalExclusive++;
                else if (node.cimCount > 1) cimGlobalShared++;
                else cimGlobalUnassigned++;

                const marker = L.circleMarker([node.latitude, node.longitude], {
                    radius: 5,
                    fillColor: "#f05e16",
                    color: "#fff",
                    weight: 1,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(markerLayerGroup);
                
                const name = node.name || node.short_name || node.long_name || "Nó Desconhecido";
                const pubKey = node.public_key;
                const shortKey = pubKey.length > 12 ? `${pubKey.substring(0,6)} (...) ${pubKey.substring(pubKey.length-6)}` : pubKey;
                const regionsHtml = nodeRegions.length > 0 ? `<br><br><b>Inserido em ${nodeRegions.length} Região(ões):</b><ul style="margin-top: 5px; padding-left: 20px;"><li>${nodeRegions.join('</li><li>')}</li></ul>` : '';
                
                marker.bindPopup(`<b>${name}</b><br><small>${shortKey}</small>${regionsHtml}`);
                markers[node.public_key] = marker;
            });

            // Build UI
            const listEl = document.getElementById('region-list');
            listEl.innerHTML = '';

            const sortedRegions = Object.keys(regionMapping).sort((a, b) => {
                const aType = a.split('|')[1];
                const bType = b.split('|')[1];
                
                if (aType !== bType) {
                    return aType === 'dist' ? -1 : 1;
                }
                
                return a.localeCompare(b);
            });
            
            sortedRegions.forEach(mappingKey => {
                const nodesInRegion = regionMapping[mappingKey];
                if (nodesInRegion.length === 0) return;

                const parts = mappingKey.split('|');
                const name = parts[0];
                const isCim = parts[1] === 'cim';
                const fwTag = formatFirmwareRegion(name, isCim);
                
                let displayName = name;
                if (isCim && !name.startsWith('CIM') && !name.startsWith('Área') && !name.startsWith('Região Autónoma') && !name.startsWith('Península') && !name.startsWith('Grande')) {
                    displayName = 'CIM ' + name;
                }
                
                if (isCim) {
                    cimLabels.push(displayName);
                    cimData.push(nodesInRegion.length);
                } else {
                    distLabels.push(displayName);
                    distData.push(nodesInRegion.length);
                }

                let exclusiveCount = 0;
                let sharedCount = 0;
                nodesInRegion.forEach(n => {
                    if (isCim) {
                        if (n.cimCount === 1) exclusiveCount++;
                        else if (n.cimCount > 1) sharedCount++;
                    } else {
                        if (n.distCount === 1) exclusiveCount++;
                        else if (n.distCount > 1) sharedCount++;
                    }
                });
                
                const pctOfTotal = ((nodesInRegion.length / activeNodes.length) * 100).toFixed(1);
                const excPct = nodesInRegion.length > 0 ? ((exclusiveCount / nodesInRegion.length) * 100).toFixed(0) : 0;
                const shrPct = nodesInRegion.length > 0 ? ((sharedCount / nodesInRegion.length) * 100).toFixed(0) : 0;
                
                const groupTypeBadge = isCim ? 
                    `<span style="background: var(--accent-secondary); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7em;">ANEPC</span>` : 
                    `<span style="background: var(--accent-primary); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7em;">Distrito</span>`;

                // Sort nodes alphabetically by name
                nodesInRegion.sort((a, b) => {
                    const nA = a.name || a.short_name || a.long_name || "";
                    const nB = b.name || b.short_name || b.long_name || "";
                    return nA.localeCompare(nB);
                });

                const groupDiv = document.createElement('div');
                groupDiv.className = 'region-group';

                const header = document.createElement('div');
                header.className = 'region-header';
                header.innerHTML = `
                    <div style="display:flex; flex-direction:column; gap: 4px;">
                        <div>${displayName} <small style="color:var(--accent-primary)">(${fwTag})</small> ${groupTypeBadge}</div>
                        <div style="font-size: 0.8em; color: var(--text-muted);">
                            <b>${pctOfTotal}%</b> dos ${activeNodes.length} nós (${excPct}% exclusivos, ${shrPct}% partilhados)
                        </div>
                    </div>
                    <span style="display:flex; align-items:center; gap:8px">
                        <span style="background: var(--bg-main); padding: 2px 8px; border-radius: 12px; font-size: 0.8em; border: 1px solid var(--border-color);">${nodesInRegion.length}</span>
                        <span class="toggle-icon">+</span>
                    </span>
                `;
                header.onclick = () => toggleRegion(header);

                const nodesContainer = document.createElement('div');
                nodesContainer.className = 'region-nodes';

                nodesInRegion.forEach(node => {
                    const nodeEl = document.createElement('div');
                    nodeEl.className = 'node-item';
                    const name = node.name || node.short_name || node.long_name || "Nó Desconhecido";
                    // Only show first 8 chars of pubkey
                    const idSnippet = node.public_key.substring(0, 8); 
                    
                    let isExclusive = isCim ? (node.cimCount === 1) : (node.distCount === 1);
                    let badgeHtml = isExclusive ? 
                        `<span style="color: #2ecc71; border: 1px solid #2ecc71; font-size: 0.65em; padding: 1px 4px; border-radius: 4px;">Exclusivo</span>` : 
                        `<span style="color: #f1c40f; border: 1px solid #f1c40f; font-size: 0.65em; padding: 1px 4px; border-radius: 4px;">Partilhado</span>`;
                    
                    nodeEl.innerHTML = `<span style="display:flex; flex-direction:column; gap:2px;"><span style="display:flex; align-items:center; gap:8px;"><span>${name}</span> ${badgeHtml}</span><span class="node-id">${idSnippet}</span></span>`;
                    nodeEl.onclick = () => focusNode(node.latitude, node.longitude);
                    
                    nodesContainer.appendChild(nodeEl);
                });

                groupDiv.appendChild(header);
                groupDiv.appendChild(nodesContainer);
                listEl.appendChild(groupDiv);
            });
            
            // Render footer charts
            const regionType = document.getElementById('typeSelect') ? document.getElementById('typeSelect').value : 'regions';
            
            const chartContainer = document.createElement('div');
            chartContainer.style.padding = '20px 10px';
            chartContainer.style.display = 'flex';
            chartContainer.style.justifyContent = 'space-around';
            chartContainer.style.flexWrap = 'wrap';
            chartContainer.style.gap = '20px';
            chartContainer.style.borderTop = '1px solid var(--border-color)';
            chartContainer.style.marginTop = '20px';
            
            if (regionType === 'regions' || regionType === 'both') {
                const div = document.createElement('div');
                div.style.width = '180px';
                div.innerHTML = `<h4 style="text-align:center; margin-bottom: 10px; font-size: 13px; color: var(--text-main);">Estatísticas - Distritos</h4><canvas id="distChart"></canvas>`;
                chartContainer.appendChild(div);
                
                const divOcc = document.createElement('div');
                divOcc.style.width = '180px';
                divOcc.innerHTML = `<h4 style="text-align:center; margin-bottom: 10px; font-size: 13px; color: var(--text-main);">Ocupação - Distritos</h4><canvas id="distOccChart"></canvas>`;
                chartContainer.appendChild(divOcc);
            }
            if (regionType === 'cims' || regionType === 'both') {
                const div = document.createElement('div');
                div.style.width = '180px';
                div.innerHTML = `<h4 style="text-align:center; margin-bottom: 10px; font-size: 13px; color: var(--text-main);">Estatísticas - ANEPC</h4><canvas id="cimChart"></canvas>`;
                chartContainer.appendChild(div);
                
                const divOcc = document.createElement('div');
                divOcc.style.width = '180px';
                divOcc.innerHTML = `<h4 style="text-align:center; margin-bottom: 10px; font-size: 13px; color: var(--text-main);">Ocupação - ANEPC</h4><canvas id="cimOccChart"></canvas>`;
                chartContainer.appendChild(divOcc);
            }
            
            listEl.appendChild(chartContainer);
            
            const chartOptions = { 
                plugins: { legend: { position: 'bottom', labels: { color: '#e0e0e0', font: { size: 10 } } } },
                cutout: '65%'
            };
            
            const pieOptions = { 
                plugins: { legend: { display: false } },
                cutout: '0%'
            };
            
            const colorPalette = ['#f05e16', '#3498db', '#9b59b6', '#2ecc71', '#f1c40f', '#e74c3c', '#1abc9c', '#34495e', '#e67e22', '#16a085', '#d35400', '#2980b9', '#8e44ad', '#27ae60', '#c0392b'];
            function getColors(count) {
                let c = [];
                for(let i = 0; i < count; i++) c.push(colorPalette[i % colorPalette.length]);
                return c;
            }

            if (regionType === 'regions' || regionType === 'both') {
                new Chart(document.getElementById('distChart'), {
                    type: 'doughnut',
                    data: {
                        labels: ['Exclusivos', 'Partilhados', 'Sem Região'],
                        datasets: [{
                            data: [distGlobalExclusive, distGlobalShared, distGlobalUnassigned],
                            backgroundColor: ['#2ecc71', '#f1c40f', '#95a5a6'],
                            borderColor: '#1e2227',
                            borderWidth: 2
                        }]
                    },
                    options: chartOptions
                });
                
                const sortedDist = distLabels.map((l, i) => ({ l, v: distData[i] })).sort((a, b) => b.v - a.v);

                new Chart(document.getElementById('distOccChart'), {
                    type: 'pie',
                    data: {
                        labels: sortedDist.map(i => i.l),
                        datasets: [{
                            data: sortedDist.map(i => i.v),
                            backgroundColor: getColors(distData.length),
                            borderColor: '#1e2227',
                            borderWidth: 1
                        }]
                    },
                    options: pieOptions
                });
            }
            
            if (regionType === 'cims' || regionType === 'both') {
                new Chart(document.getElementById('cimChart'), {
                    type: 'doughnut',
                    data: {
                        labels: ['Exclusivos', 'Partilhados', 'Sem Região'],
                        datasets: [{
                            data: [cimGlobalExclusive, cimGlobalShared, cimGlobalUnassigned],
                            backgroundColor: ['#2ecc71', '#f1c40f', '#95a5a6'],
                            borderColor: '#1e2227',
                            borderWidth: 2
                        }]
                    },
                    options: chartOptions
                });
                
                const sortedCim = cimLabels.map((l, i) => ({ l, v: cimData[i] })).sort((a, b) => b.v - a.v);

                new Chart(document.getElementById('cimOccChart'), {
                    type: 'pie',
                    data: {
                        labels: sortedCim.map(i => i.l),
                        datasets: [{
                            data: sortedCim.map(i => i.v),
                            backgroundColor: getColors(cimData.length),
                            borderColor: '#1e2227',
                            borderWidth: 1
                        }]
                    },
                    options: pieOptions
                });
            }
        }

        window.onload = async () => {
            initMap();
            await fetchRegions();
            await fetchNodes();
            document.getElementById('loader').style.display = 'none';
            calculateIntersectionsAndRender();
        };

    </script>
</body>
</html>
